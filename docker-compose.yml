# owuicore — Socle OpenWebUI + Keycloak + Pipelines + SearXNG + Tika
# Réseau owui-net partagé avec les feature repos

services:
  openwebui:
    image: ${OPENWEBUI_IMAGE:-ghcr.io/open-webui/open-webui:v0.8.12}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        # Patch MCP label: use connection name instead of generic "MCP Tool Server"
        sed -i "s/'name': server.get('info', {}).get('name', 'MCP Tool Server')/'name': server.get('info', {}).get('name', server.get('name', 'MCP Tool Server'))/" /app/backend/open_webui/routers/tools.py 2>/dev/null || true
        # Patch image upload: skip processing for images (vision filter handles them)
        python3 -c "
        c = open('/app/backend/open_webui/routers/files.py').read()
        old = \"raise Exception(f'File type {content_type} is not supported for processing')\"
        new = \"__import__('logging').getLogger(__name__).info(f'Skip processing {content_type}')\"
        open('/app/backend/open_webui/routers/files.py','w').write(c.replace(old, new))
        " 2>/dev/null || true
        # Start OWUI
        exec bash /app/backend/start.sh
    env_file:
      - .env
    environment:
      ENV: ${OPENWEBUI_ENV:-prod}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-CHANGE_ME}
      ENABLE_SIGNUP: "false"
      ENABLE_LOGIN_FORM: "false"
      ENABLE_OAUTH_SIGNUP: ${ENABLE_OAUTH_SIGNUP:-true}
      DEFAULT_USER_ROLE: ${DEFAULT_USER_ROLE:-user}
      OAUTH_MERGE_ACCOUNTS_BY_EMAIL: ${OAUTH_MERGE_ACCOUNTS_BY_EMAIL:-true}
      OAUTH_PROVIDER_NAME: Keycloak
      OPENID_PROVIDER_URL: http://host.docker.internal:${KEYCLOAK_PORT:-8082}/realms/openwebui/.well-known/openid-configuration
      OAUTH_CLIENT_ID: openwebui
      OAUTH_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET_LOCAL:-CHANGE_ME}
      OAUTH_SCOPES: openid profile email
      OPENAI_API_BASE_URL: http://pipelines:9099/v1
      OPENAI_API_KEY: ${PIPELINES_API_KEY:-CHANGE_ME}
      OPENAI_API_BASE_URLS: ${OPENAI_API_BASE_URLS:-http://pipelines:9099/v1}
      OPENAI_API_KEYS: ${OPENAI_API_KEYS:-${PIPELINES_API_KEY:-CHANGE_ME}}
      ENABLE_WEB_SEARCH: "true"
      WEB_SEARCH_ENGINE: ${WEB_SEARCH_ENGINE:-searxng}
      SEARXNG_QUERY_URL: ${SEARXNG_QUERY_URL:-http://searxng:8080/search}
      ENABLE_IMAGE_GENERATION: "true"
      IMAGE_GENERATION_ENGINE: openai
      IMAGES_OPENAI_API_BASE_URL: http://image-gen:9100/v1
      IMAGES_OPENAI_API_KEY: ${HF_TOKEN:-not-used}
      IMAGE_GENERATION_MODEL: ${HF_IMAGE_MODEL:-black-forest-labs/FLUX.1-schnell}
      ENABLE_API_KEYS: "true"
      DEFAULT_MODELS: ${DEFAULT_MODEL:-mistral-small-3.2-24b-instruct-2506}
      # Task model for function calling / title generation
      TASK_MODEL_EXTERNAL: ${TASK_MODEL:-mistral-small-3.2-24b-instruct-2506}
      DIRECT_TOOL_CALLING: "true"
      # Disable auto web search — let the model decide when to search via tools
      ENABLE_SEARCH_QUERY_GENERATION: "false"
      # --- RAG: local embeddings (avoids Scaleway rate limits) ---
      RAG_EMBEDDING_ENGINE: ""
      RAG_EMBEDDING_MODEL: sentence-transformers/all-MiniLM-L6-v2
      RAG_EMBEDDING_BATCH_SIZE: "16"
      # --- RAG: document extraction via Tika ---
      CONTENT_EXTRACTION_ENGINE: tika
      TIKA_SERVER_URL: http://tika:9998
    volumes:
      - openwebui-data:/app/backend/data
    depends_on:
      pipelines:
        condition: service_started
      tika:
        condition: service_healthy
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    networks:
      - owui-net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    command:
      - start-dev
      - --import-realm
      - --hostname-url=http://localhost:${KEYCLOAK_PORT:-8082}
      - --hostname-strict=false
    env_file:
      - .env
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-CHANGE_ME}
    volumes:
      - ./keycloak/realm-openwebui.json:/opt/keycloak/data/import/realm-openwebui.json:ro
    ports:
      - "${KEYCLOAK_PORT:-8082}:8080"
    networks:
      - owui-net

  pipelines:
    image: ${PIPELINES_IMAGE:-ghcr.io/open-webui/pipelines:main}
    env_file:
      - .env
    environment:
      PIPELINES_API_KEY: ${PIPELINES_API_KEY:-CHANGE_ME}
      SCW_LLM_BASE_URL: ${SCW_LLM_BASE_URL:-}
      SCW_SECRET_KEY_LLM: ${SCW_SECRET_KEY_LLM:-}
      SCW_LLM_MODEL: ${SCW_LLM_MODEL:-}
    volumes:
      - ./pipelines:/app/pipelines
    ports:
      - "${PIPELINES_PORT:-9099}:9099"
    networks:
      - owui-net

  searxng:
    profiles: ["search"]
    image: ${SEARXNG_IMAGE:-docker.io/searxng/searxng:latest}
    env_file:
      - .env
    environment:
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
      SEARXNG_BASE_URL: ${SEARXNG_LOCAL_BASE_URL:-http://localhost:8083}
      SEARXNG_SECRET: ${SEARXNG_SECRET:-CHANGE_ME}
      SEARXNG_VALKEY_URL: valkey://search-valkey:6379/0
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      HTTP_PROXY: ${PROXY_URL:-}
      HTTPS_PROXY: ${PROXY_URL:-}
      NO_PROXY: localhost,127.0.0.1,openwebui,keycloak,pipelines,search-valkey,tika
    volumes:
      - ./search/local/settings.yml:/etc/searxng/settings.yml
    depends_on:
      - search-valkey
    ports:
      - "${SEARXNG_LOCAL_PORT:-8083}:8080"
    networks:
      - owui-net

  search-valkey:
    profiles: ["search"]
    image: ${VALKEY_IMAGE:-docker.io/valkey/valkey:8-alpine}
    command:
      - --save
      - ""
      - --appendonly
      - "no"
    networks:
      - owui-net

  image-gen:
    profiles: ["image-gen"]
    build:
      context: ./image-gen
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HF_IMAGE_MODEL: ${HF_IMAGE_MODEL:-black-forest-labs/FLUX.1-schnell}
      HF_TIMEOUT: ${HF_TIMEOUT:-120}
      PORT: "9100"
    ports:
      - "${IMAGE_GEN_PORT:-9100}:9100"
    networks:
      - owui-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9100/healthz').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 5

  tika:
    image: apache/tika:latest
    ports:
      - "9998:9998"
    networks:
      - owui-net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/9998'"]
      interval: 15s
      timeout: 5s
      retries: 5

  ensure-tools:
    image: python:3.12-slim
    working_dir: /socle
    command: ["bash", "-c", "pip install -q pyyaml && python3 scripts/ensure_tools.py --mode docker --wait --db-path /owui-data/webui.db"]
    environment:
      PLUGIN_PATHS: ${PLUGIN_PATHS:-}
      SEARXNG_QUERY_URL: ${SEARXNG_QUERY_URL:-http://searxng:8080/search}
      WEB_SEARCH_RESULT_COUNT: ${WEB_SEARCH_RESULT_COUNT:-5}
      WEB_SEARCH_CONCURRENT_REQUESTS: ${WEB_SEARCH_CONCURRENT_REQUESTS:-3}
      HF_TOKEN: ${HF_TOKEN:-}
      HF_IMAGE_MODEL: ${HF_IMAGE_MODEL:-black-forest-labs/FLUX.1-schnell}
      IMAGES_OPENAI_API_BASE_URL: http://image-gen:9100/v1
      PIPELINES_URL: http://pipelines:9099
      PIPELINES_API_KEY: ${PIPELINES_API_KEY:-}
      SCW_LLM_BASE_URL: ${SCW_LLM_BASE_URL:-}
      SCW_SECRET_KEY_LLM: ${SCW_SECRET_KEY_LLM:-}
      DEFAULT_MODEL: ${DEFAULT_MODEL:-gpt-oss-120b}
    volumes:
      - .:/socle:ro
      - openwebui-data:/owui-data
      - ./pipelines:/pipelines-out
      - ..:/parent:ro
    depends_on:
      openwebui:
        condition: service_healthy
    networks:
      - owui-net
    restart: "no"

  register-watcher:
    profiles: ["dev"]
    image: python:3.12-slim
    working_dir: /socle
    command: ["python3", "scripts/register_watcher.py"]
    environment:
      OWUI_API_URL: http://openwebui:8080
      OWUI_API_KEY: ${OWUI_API_KEY:-}
      WATCHER_INTERVAL: ${WATCHER_INTERVAL:-5}
      PLUGIN_PATHS: ${PLUGIN_PATHS:-}
    volumes:
      - .:/socle:ro
      - ${PLUGIN_PARENT_DIR:-..}:/plugins:ro
    depends_on:
      openwebui:
        condition: service_healthy
    networks:
      - owui-net

volumes:
  openwebui-data:
    name: owui-socle-openwebui-data

networks:
  owui-net:
    name: owui-net
    driver: bridge
