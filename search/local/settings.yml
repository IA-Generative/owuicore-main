use_default_settings:
  engines:
    keep_only:
      - duckduckgo
      - brave
      - startpage
      - qwant
      - mojeek
      - wikipedia
      - bing
      - google

general:
  instance_name: "MirAI Search Local"
  enable_metrics: false

search:
  safe_search: 1
  autocomplete: "duckduckgo"
  formats:
    - html
    - json

server:
  limiter: false
  image_proxy: true

ui:
  default_locale: "fr"
  query_in_title: false

valkey:
  url: valkey://search-valkey:6379/0

outgoing:
  request_timeout: 8.0
  max_request_timeout: 15.0
  retries: 2
  pool_connections: 50
  pool_maxsize: 10
  enable_http2: true

engines:
  # --- Moteurs généraux (par ordre de priorité) ---
  - name: qwant
    weight: 1.6
  - name: startpage
    weight: 1.4
  - name: brave
    weight: 1.3
  - name: mojeek
    weight: 1.1
  - name: duckduckgo
    weight: 1.0
  - name: wikipedia
    weight: 0.8
  - name: bing
    weight: 0.7
  - name: google
    weight: 0.6
