apiVersion: batch/v1
kind: Job
metadata:
  name: ensure-tools
  namespace: ${NAMESPACE}
  labels:
    app: ensure-tools
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ensure-tools
          image: python:3.12-slim
          command:
            - bash
            - -c
            - |
              pip install -q --user pyyaml &&
              python3 /scripts/ensure_tools.py \
                --mode k8s \
                --wait \
                --db-path /owui-data/webui.db
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: HOME
              value: /tmp
            - name: PATH
              value: /tmp/.local/bin:/usr/local/bin:/usr/bin:/bin
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: owui-data
              mountPath: /owui-data
            - name: plugins
              mountPath: /plugins
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: scripts
          configMap:
            name: ensure-tools-scripts
        - name: owui-data
          persistentVolumeClaim:
            claimName: openwebui-data
        - name: plugins
          configMap:
            name: plugin-registry
            optional: true
        - name: tmp
          emptyDir: {}
