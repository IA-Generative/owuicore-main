apiVersion: v1
kind: ConfigMap
metadata:
  name: grafrag-config
  namespace: ${NAMESPACE}
data:
  SCW_LLM_BASE_URL: "${SCW_LLM_BASE_URL}"
  SCW_LLM_MODEL: "${SCW_LLM_MODEL}"
  SCW_CHAT_BASE_URL: "${SCW_CHAT_BASE_URL}"
  SCW_EMBEDDING_BASE_URL: "${SCW_EMBEDDING_BASE_URL}"
  SCW_CHAT_MODEL: "${SCW_CHAT_MODEL}"
  SCW_EMBEDDING_MODEL: "${SCW_EMBEDDING_MODEL}"
  OPENAI_EMBEDDING_MODEL: "${OPENAI_EMBEDDING_MODEL}"
  OPENAI_EMBEDDING_VECTOR_SIZE: "${OPENAI_EMBEDDING_VECTOR_SIZE}"
  BRIDGE_PUBLIC_URL: "https://${BRIDGE_HOST}"
  OPENWEBUI_PUBLIC_URL: "https://${OPENWEBUI_HOST}"
  CORPUS_MANAGER_PUBLIC_URL: "https://${CORPUS_MANAGER_HOST}"
  KEYCLOAK_PUBLIC_URL: "https://${KEYCLOAK_HOST}"
  KEYCLOAK_INTERNAL_URL: "http://keycloak"
  KEYCLOAK_REALM: "${KEYCLOAK_REALM}"
  GRAPH_VIEWER_CLIENT_ID: "${GRAPH_VIEWER_CLIENT_ID}"
  GRAPH_VIEWER_AUTH_REQUIRED: "${GRAPH_VIEWER_AUTH_REQUIRED}"
  CORPUS_MANAGER_CLIENT_ID: "${CORPUS_MANAGER_CLIENT_ID}"
  CORPUS_MANAGER_AUTH_REQUIRED: "${CORPUS_MANAGER_AUTH_REQUIRED}"
  GRAPHRAG_METHOD: "${GRAPHRAG_METHOD}"
  GRAPHRAG_RESPONSE_TYPE: "${GRAPHRAG_RESPONSE_TYPE}"
  GRAPHRAG_ROOT: /data/graphrag
  GRAPHRAG_INPUT_DIR: /data/graphrag/input
  GRAPHRAG_OUTPUT_DIR: /data/graphrag/output
  GRAPHRAG_CACHE_DIR: /data/graphrag/cache
  CORPUS_MANAGER_ROOT: /data/corpus-manager
  GRAPHRAG_CACHE_S3_ENABLED: "${GRAPHRAG_CACHE_S3_ENABLED}"
  GRAPHRAG_CACHE_S3_BUCKET: "${GRAPHRAG_CACHE_S3_BUCKET}"
  GRAPHRAG_CACHE_S3_PREFIX: "${GRAPHRAG_CACHE_S3_PREFIX}"
  GRAPHRAG_CACHE_S3_REGION: "${GRAPHRAG_CACHE_S3_REGION}"
  GRAPHRAG_CACHE_S3_ENDPOINT_URL: "${GRAPHRAG_CACHE_S3_ENDPOINT_URL}"
  GRAPHRAG_TOP_K: "${GRAPHRAG_TOP_K}"
  REQUEST_TIMEOUT_SECONDS: "${REQUEST_TIMEOUT_SECONDS}"
  GRAPHRAG_CLI_TIMEOUT_SECONDS: "${GRAPHRAG_CLI_TIMEOUT_SECONDS}"
  GRAPHRAG_GLOBAL_CLI_TIMEOUT_SECONDS: "${GRAPHRAG_GLOBAL_CLI_TIMEOUT_SECONDS}"
  LLM_TIMEOUT_SECONDS: "${LLM_TIMEOUT_SECONDS}"
  GRAPHRAG_INDEX_TIMEOUT_SECONDS: "${GRAPHRAG_INDEX_TIMEOUT_SECONDS}"
  OPENWEBUI_HOST: "${OPENWEBUI_HOST}"
  CORPUS_MANAGER_HOST: "${CORPUS_MANAGER_HOST}"
  KEYCLOAK_HOST: "${KEYCLOAK_HOST}"
  SEARXNG_HOST: "${SEARXNG_HOST}"
  SEARXNG_BASE_URL: "http://searxng"
  OPENID_PROVIDER_URL: "https://${KEYCLOAK_HOST}/realms/openwebui/.well-known/openid-configuration"
