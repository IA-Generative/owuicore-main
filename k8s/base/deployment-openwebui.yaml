apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      enableServiceLinks: false
      containers:
        - name: openwebui
          image: ${OPENWEBUI_IMAGE}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: grafrag-config
            - secretRef:
                name: grafrag-secrets
          env:
            - name: ENABLE_LOGIN_FORM
              value: "false"
            - name: ENABLE_SIGNUP
              value: "false"
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            - name: DEFAULT_USER_ROLE
              value: "user"
            - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
              value: "true"
            - name: OAUTH_PROVIDER_NAME
              value: "Keycloak"
            - name: OAUTH_CLIENT_ID
              value: "openwebui"
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafrag-secrets
                  key: KEYCLOAK_CLIENT_SECRET
            - name: OAUTH_SCOPES
              value: "openid profile email"
            - name: OPENAI_API_BASE_URL
              value: "http://pipelines:9099/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: grafrag-secrets
                  key: PIPELINES_API_KEY
            - name: ENABLE_WEB_SEARCH
              value: "true"
            - name: WEB_SEARCH_ENGINE
              value: "searxng"
            - name: WEB_SEARCH_RESULT_COUNT
              value: "5"
            - name: WEB_SEARCH_CONCURRENT_REQUESTS
              value: "3"
            - name: WEB_SEARCH_TRUST_ENV
              value: "false"
            - name: SEARXNG_QUERY_URL
              value: "http://searxng/search"
            - name: SEARXNG_LANGUAGE
              value: "all"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: openwebui-data
              mountPath: /app/backend/data
      volumes:
        - name: openwebui-data
          emptyDir: {}
