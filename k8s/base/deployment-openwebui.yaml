apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      enableServiceLinks: false
      containers:
        - name: openwebui
          image: ${OPENWEBUI_IMAGE}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: owui-socle-config
            - secretRef:
                name: owui-socle-secrets
          env:
            - name: ENABLE_LOGIN_FORM
              value: "false"
            - name: ENABLE_SIGNUP
              value: "false"
            - name: ENABLE_OAUTH_SIGNUP
              value: "true"
            - name: DEFAULT_USER_ROLE
              value: "user"
            - name: OAUTH_MERGE_ACCOUNTS_BY_EMAIL
              value: "true"
            - name: OAUTH_PROVIDER_NAME
              value: "Keycloak"
            - name: OAUTH_CLIENT_ID
              value: "openwebui"
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: owui-socle-secrets
                  key: KEYCLOAK_CLIENT_SECRET
            - name: OAUTH_SCOPES
              value: "openid profile email"
            - name: OPENAI_API_BASE_URL
              value: "http://pipelines:9099/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: owui-socle-secrets
                  key: PIPELINES_API_KEY
            # --- Tool calling ---
            - name: DIRECT_TOOL_CALLING
              value: "true"
            - name: ENABLE_SEARCH_QUERY_GENERATION
              value: "false"
            - name: ENABLE_API_KEYS
              value: "true"
            # --- Default model ---
            - name: DEFAULT_MODELS
              value: "gpt-oss-120b"
            - name: TASK_MODEL_EXTERNAL
              value: "gpt-oss-120b"
            # --- Web search ---
            - name: ENABLE_WEB_SEARCH
              value: "false"
            - name: WEB_SEARCH_ENGINE
              value: "searxng"
            - name: SEARXNG_QUERY_URL
              value: "http://searxng/search"
            # --- Image generation ---
            - name: ENABLE_IMAGE_GENERATION
              value: "false"
            # --- RAG: embeddings via Scaleway ---
            - name: RAG_EMBEDDING_ENGINE
              value: "openai"
            - name: RAG_EMBEDDING_MODEL
              value: "${OPENAI_EMBEDDING_MODEL}"
            - name: RAG_OPENAI_API_BASE_URL
              value: "${SCW_LLM_BASE_URL}"
            - name: RAG_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: owui-socle-secrets
                  key: SCW_SECRET_KEY_LLM
            - name: RAG_EMBEDDING_BATCH_SIZE
              value: "16"
            # --- RAG: Tika ---
            - name: CONTENT_EXTRACTION_ENGINE
              value: "tika"
            - name: TIKA_SERVER_URL
              value: "http://tika:9998"
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    sed -i "s/'name': server.get('info', {}).get('name', 'MCP Tool Server')/'name': server.get('info', {}).get('name', server.get('name', 'MCP Tool Server'))/" /app/backend/open_webui/routers/tools.py 2>/dev/null || true
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - name: openwebui-data
              mountPath: /app/backend/data
      volumes:
        - name: openwebui-data
          persistentVolumeClaim:
            claimName: openwebui-data
