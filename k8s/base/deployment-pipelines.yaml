apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipelines
  namespace: ${NAMESPACE}
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: pipelines
  template:
    metadata:
      labels:
        app: pipelines
    spec:
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: copy-pipelines
          image: docker.io/library/busybox:1.36
          command:
            - /bin/sh
            - -c
            - cp -R /config/. /workdir/
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: pipelines-config
              mountPath: /config
              readOnly: true
            - name: pipelines-workdir
              mountPath: /workdir
      containers:
        - name: pipelines
          image: ${PIPELINES_IMAGE}
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          envFrom:
            - configMapRef:
                name: owui-socle-config
            - secretRef:
                name: owui-socle-secrets
          ports:
            - containerPort: 9099
              name: http
          volumeMounts:
            - name: pipelines-workdir
              mountPath: /app/pipelines
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: pipelines-config
          configMap:
            name: pipelines-config
        - name: pipelines-workdir
          emptyDir: {}
        - name: tmp
          emptyDir: {}
