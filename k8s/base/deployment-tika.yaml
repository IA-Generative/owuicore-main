apiVersion: apps/v1
kind: Deployment
metadata:
  name: tika
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tika
  template:
    metadata:
      labels:
        app: tika
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 35002
        runAsGroup: 35002
        fsGroup: 35002
      containers:
        - name: tika
          image: apache/tika:latest
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 9998
          readinessProbe:
            tcpSocket:
              port: 9998
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tika
  namespace: ${NAMESPACE}
spec:
  selector:
    app: tika
  ports:
    - port: 9998
      targetPort: 9998
