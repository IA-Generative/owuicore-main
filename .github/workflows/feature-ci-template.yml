# Template CI for feature repos.
# Copy this to your feature repo as .github/workflows/ci.yml
# and adjust the service name, port, and test commands.
#
# Requires: owui-plugin.yaml at repo root.

name: CI — Feature

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Adjust these for your feature
  SERVICE_NAME: my-service
  SERVICE_PORT: 8000
  HEALTHCHECK_PATH: /healthz

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate owui-plugin.yaml
        run: |
          python3 -c "
          import yaml, sys
          d = yaml.safe_load(open('owui-plugin.yaml'))
          assert 'name' in d, 'Missing name'
          assert 'version' in d, 'Missing version'
          print(f\"Plugin: {d['name']} v{d['version']}\")
          print(f\"Services: {[s['name'] for s in d.get('services', [])]}\")
          print(f\"Tools: {[t['id'] for t in d.get('tools', {}).get('entries', [])]}\")
          print('OK')
          "

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker compose build

      - name: Create owui-net network
        run: docker network create owui-net || true

      - name: Start service
        run: docker compose up -d

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:${{ env.SERVICE_PORT }}${{ env.HEALTHCHECK_PATH }} >/dev/null 2>&1; then
              echo "Service healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Timeout"
          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down
